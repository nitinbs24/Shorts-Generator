name: Channel A — TrendByte Shorts

on:
  schedule:
    # 8 AM UTC  = 1:30 PM IST  (afternoon post)
    - cron: "0 8 * * *"
    # 6 PM UTC  = 11:30 PM IST (night post)
    - cron: "0 18 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  publish:
    name: Publish TrendByte Short
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
      PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
      YOUTUBE_CLIENT_ID:          ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET:      ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN_A:    ${{ secrets.YOUTUBE_REFRESH_TOKEN_A }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Channel A pipeline
        run: python main.py --channel a
