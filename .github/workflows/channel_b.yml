name: Channel B — Rhymie Kids

on:
  schedule:
    # 7 AM UTC  = 12:30 PM IST (lunch post)
    - cron: "0 7 * * *"
    # 4 PM UTC  = 9:30 PM IST  (bedtime post)
    - cron: "0 16 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  publish:
    name: Publish Rhymie Kids Short
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
      PEXELS_API_KEY:             ${{ secrets.PEXELS_API_KEY }}
      YOUTUBE_CLIENT_ID:          ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET:      ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN_B:    ${{ secrets.YOUTUBE_REFRESH_TOKEN_B }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Channel B pipeline
        run: python main.py --channel b
